<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VINIL | Checkout</title>
  <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="/public/css/styles.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">VINIL</a>
      <div class="ms-auto d-flex gap-2">
        <a href="/catalogo" class="btn btn-outline-light">Seguir comprando</a>
        <a href="/carrito" class="btn btn-primary">Carrito</a>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="mb-4">
      <h1 class="fw-bold mb-1">Proceder al pago</h1>
      <p class="text-muted mb-0">Finaliza tu compra online</p>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card shadow-sm rounded-4 p-4 mb-4">
          <h4 class="fw-bold mb-3">Datos de envío</h4>
          <form>
            <div class="row g-3">
              <div class="col-md-6"><input type="text" class="form-control" placeholder="Nombre completo"></div>
              <div class="col-md-6"><input type="email" class="form-control" placeholder="Correo"></div>
              <div class="col-md-8"><input type="text" class="form-control" placeholder="Dirección"></div>
              <div class="col-md-4"><input type="text" class="form-control" placeholder="CP"></div>
              <div class="col-md-6"><input type="text" class="form-control" placeholder="Ciudad"></div>
              <div class="col-md-6"><input type="text" class="form-control" placeholder="Estado"></div>
            </div>
          </form>
        </div>

        <div class="card shadow-sm rounded-4 p-4">
          <h4 class="fw-bold mb-3">Método de pago</h4>
          <div class="form-check mb-2">
            <input class="form-check-input" type="radio" name="pago" checked>
            <label class="form-check-label">Tarjeta</label>
          </div>
          <div class="row g-3 mt-2">
            <div class="col-md-8"><input type="text" class="form-control" placeholder="Número de tarjeta"></div>
            <div class="col-md-4"><input type="text" class="form-control" placeholder="CVV"></div>
            <div class="col-md-6"><input type="text" class="form-control" placeholder="Titular"></div>
            <div class="col-md-6"><input type="text" class="form-control" placeholder="MM/AA"></div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card shadow-sm rounded-4 p-4">
          <h4 class="fw-bold mb-3">Resumen</h4>
          <div class="d-flex justify-content-between mb-2"><span>Nevermind</span><span>$350</span></div>
          <div class="d-flex justify-content-between mb-2"><span>Envío</span><span>$120</span></div>
          <hr>
          <div class="d-flex justify-content-between mb-3"><strong>Total</strong><strong>$470</strong></div>
          <div class="d-grid">
            <a href="/confirmacion" class="btn btn-success btn-lg rounded-3">Confirmar compra</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
