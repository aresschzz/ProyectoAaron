<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VINIL | Compras de Vinilos</title>
  <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="/public/css/styles.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin/dashboard">VINIL Admin</a>
      <a href="/admin/dashboard" class="btn btn-outline-light">Volver</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="fw-bold">Compras de Vinilos</h1>
        <p class="text-muted mb-0">Registro de compras hechas a clientes/proveedores.</p>
      </div>
      <a href="/admin/nueva-compra" class="btn btn-success">+ Nueva compra</a>
    </div>

    <div class="card shadow-sm rounded-4 border-0 p-4">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Proveedor</th>
              <th>Vinilo</th>
              <th>Estado</th>
              <th>Total pagado</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>C001</td>
              <td>Juan Ramírez</td>
              <td>Nevermind - Nirvana</td>
              <td><span class="badge text-bg-warning">En revisión</span></td>
              <td>$200</td>
              <td>29/03/2026</td>
            </tr>
            <tr>
              <td>C002</td>
              <td>Laura Sánchez</td>
              <td>Thriller - Michael Jackson</td>
              <td><span class="badge text-bg-success">Disponible</span></td>
              <td>$350</td>
              <td>28/03/2026</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
